<h1>Contact</h1>
<p>Fill out the form below and I'll get back to you as soon as I can.</p>

<form id="contact-form" class="contact-form">
    <div class="form-group">
        <label for="contact-name">Name</label>
        <input type="text" id="contact-name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-group">
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
        <label for="contact-subject">Subject</label>
        <input type="text" id="contact-subject" name="subject" placeholder="Subject" required>
    </div>
    <div class="form-group">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="5" placeholder="Your message..." required></textarea>
    </div>
    <div id="form-status" class="form-status"></div>
    <button type="submit" class="go-btn">Send</button>
</form>
